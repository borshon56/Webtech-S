<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Lab Task - Final</title>
    <style>
        body { font-family: Arial; }

        li {
            margin: 5px 0;
            padding: 8px;
            border: 1px solid #ccc;
        }

        .present {
            background-color: lightgreen;
        }

        .highlight {
            border: 2px solid red;
        }

        button {
            margin-left: 5px;
        }
    </style>
</head>
<body>

<h2>Student Manager System</h2>


<input type="text" id="nameInput" placeholder="Enter Name">
<input type="text" id="rollInput" placeholder="Enter Roll No. (e.g., 23-55078-3)">
<button id="addBtn" disabled>Add</button>

<button id="sortBtn">Sort A–Z</button>
<button id="highlightBtn">Highlight First Student</button>

<br><br>

<input type="text" id="searchInput" placeholder="Search student">

<ul id="studentList"></ul>

<p id="total">Total students: 0</p>
<p id="attendance">Present: 0, Absent: 0</p>

<script>
    const nameInput = document.getElementById("nameInput");
    const rollInput = document.getElementById("rollInput");
    const addBtn = document.getElementById("addBtn");
    const studentList = document.getElementById("studentList");
    const totalText = document.getElementById("total");
    const attendanceText = document.getElementById("attendance");
    const searchInput = document.getElementById("searchInput");


    nameInput.addEventListener("input", () => {
        addBtn.disabled = nameInput.value.trim() === "";
    });

    addBtn.addEventListener("click", () => {
        const name = nameInput.value.trim();
        const roll = rollInput.value.trim();

        const li = document.createElement("li");

        
        const text = document.createElement("span");
        text.textContent = `ID: ${roll} – Name: ${name}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";

        checkbox.addEventListener("change", () => {
            li.classList.toggle("present", checkbox.checked);
            updateAttendance();
        });

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";

        editBtn.onclick = () => {
            const newName = prompt("Edit Name:", name);
            const newRoll = prompt("Edit Roll:", roll);

            if (newName && newRoll) {
                text.textContent = `ID: ${newRoll} – Name: ${newName}`;
            }
        };

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";

        delBtn.onclick = () => {
            if (confirm("Are you sure you want to delete this student?")) {
                li.remove();
                updateCount();
                updateAttendance();
            }
        };

        li.appendChild(checkbox);
        li.appendChild(text);
        li.appendChild(editBtn);
        li.appendChild(delBtn);

        studentList.appendChild(li);

        nameInput.value = "";
        rollInput.value = "";
        addBtn.disabled = true;

        updateCount();
        updateAttendance();
    });


    function updateCount() {
        totalText.textContent = "Total students: " + studentList.children.length;
    }


    function updateAttendance() {
        let present = 0;
        let total = studentList.children.length;

        for (let li of studentList.children) {
            if (li.querySelector("input").checked) {
                present++;
            }
        }

        attendanceText.textContent =
            `Present: ${present}, Absent: ${total - present}`;
    }

    
    searchInput.addEventListener("input", () => {
        const value = searchInput.value.toLowerCase();

        for (let li of studentList.children) {
            const text = li.querySelector("span").textContent.toLowerCase();
            li.style.display = text.includes(value) ? "" : "none";
        }
    });

   
    document.getElementById("sortBtn").onclick = () => {
        let items = Array.from(studentList.children);

        items.sort((a, b) => {
            let nameA = a.querySelector("span").textContent.toLowerCase();
            let nameB = b.querySelector("span").textContent.toLowerCase();
            return nameA.localeCompare(nameB);
        });

        studentList.innerHTML = "";
        items.forEach(item => studentList.appendChild(item));
    };


    document.getElementById("highlightBtn").onclick = () => {
        for (let li of studentList.children) {
            li.classList.remove("highlight");
        }

        if (studentList.firstElementChild) {
            studentList.firstElementChild.classList.add("highlight");
        }
    };
</script>

</body>
</html>
