<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model Demo</title>
<link rel="stylesheet" href="lt-3-1.css">
</head>

<body>

<h2>Box Model</h2>

<div class="box1">Box 1</div>
<div class="box2">Box 2</div>
<div class="box3">Box 3</div>

<h2>Display Properties</h2>

<p class="block">This is block element</p>

<span class="inline">Inline 1</span>
<span class="inline">Inline 2</span>

<div class="inlineblock">Inline Block</div>

<p class="none">This text will not appear</p>

<h2>Visibility vs Display</h2>

<p class="hidden">This is visibility hidden</p>
<p>This text stays in normal position</p>

</body>
</html>
