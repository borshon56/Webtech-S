<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Lab Task 03 - Box Model</title>
    <link rel="stylesheet" href="lt3-1.css">
</head>

<body>

    <h1>CSS Box Model and Display Properties</h1>

    <div class="box default">Default Box</div>
    <div class="box border-box">Border-Box</div>
    <div class="box padded">Padded Box</div>

    <hr>

    <h2>Display Properties</h2>

    <div class="block">I am block</div>


    <span class="inline">I am inline</span>
    <span class="inline">Inline again</span>

    <br><br>

    <div class="inline-block">Inline-block 1</div>
    <div class="inline-block">Inline-block 2</div>

    <br><br>

    <p class="hidden-display">You cannot see me (display:none)</p>

    <p class="hidden-visibility">I am invisible but still occupy space (visibility:hidden)</p>

</body>

</html>
