<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Lab Task 01</title>

  
    <style>

        * {
            font-family: Arial, sans-serif;
        }

     
        p {
            color: blue;
            font-size: 16px;
        }

     
        .highlight {
            background-color: yellow;
        }

       
        #mainTitle {
            text-align: center;
            color: green;
        }
    </style>


    <link rel="stylesheet" href="style.css">

</head>

<body>


    <h1 id="mainTitle" style="background-color: lightgray;">
        Welcome to CSS Lab
    </h1>

    <p>This is a normal paragraph styled using element selector.</p>

    <p class="highlight">
        This paragraph uses a class selector with highlight.
    </p>

    <h2>External CSS Example</h2>
    <p class="externalText">
        This paragraph is styled using external CSS.
    </p>

</body>

</html>
