<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Functions and Loops Lab</title>
</head>

<body>

<h1>Functions, Loops, and String Operations</h1>

<h2>Function Result</h2>
<p id="sumResult"></p>

<h2>For Loop (1 to 10)</h2>
<p id="forLoop"></p>

<h2>While Loop (Even numbers 1-20)</h2>
<p id="whileLoop"></p>

<h2>String Operations</h2>
<p id="stringResult"></p>

<h2>User Input String Check</h2>
<p id="checkResult"></p>

<script>

function calculateSum(a, b){
    return a + b;
}

let result = calculateSum(10, 20);

document.getElementById("sumResult").innerHTML = "Sum = " + result;



let numbers = "";

for(let i = 1; i <= 10; i++){
    numbers += i + " ";
}

document.getElementById("forLoop").innerHTML = numbers;

let evenNumbers = "";
let i = 2;

while(i <= 20){
    evenNumbers += i + " ";
    i += 2;
}

document.getElementById("whileLoop").innerHTML = evenNumbers;

let fullName = "Borshon Debnath";

let upperCase = fullName.toUpperCase();
let length = fullName.length;

let firstName = fullName.split(" ")[0];

let stringOutput = "Full Name: " + fullName + "<br>" +
                   "Uppercase: " + upperCase + "<br>" +
                   "Length: " + length + "<br>" +
                   "First Name: " + firstName;

document.getElementById("stringResult").innerHTML = stringOutput;



function checkStringLength(){

    let userText = prompt("Enter a word:");

    if(userText.length > 5){
        document.getElementById("checkResult").innerHTML =
        "The string length is greater than 5.";
    }
    else{
        document.getElementById("checkResult").innerHTML =
        "The string length is 5 or less.";
    }
}

checkStringLength();

</script>

</body>
</html>
