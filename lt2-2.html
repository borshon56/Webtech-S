<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Lab Task 02</title>
</head>
<body>

    <h1>JavaScript Lab Task 02</h1>

    <div id="output"></div>

    <script>
    
        function calculateSum(a, b) {
            return a + b;
        }

        let sumResult = calculateSum(10, 20);

        document.getElementById("output").innerHTML += `
            <h3>Part A: Function</h3>
            Sum of 10 and 20 = ${sumResult}
        `;

    
        document.write("<h3>Part B: For Loop (1 to 10)</h3>");
        for (let i = 1; i <= 10; i++) {
            document.write(i + " ");
        }

    
        document.write("<h3>While Loop (Even numbers 1 to 20)</h3>");
        let j = 2;
        while (j <= 20) {
            document.write(j + " ");
            j += 2;
        }

    
        let fullName = "Borshon Debnath";

        let upperCaseName = fullName.toUpperCase();
        let nameLength = fullName.length;
        let firstName = fullName.split(" ")[0];

        document.getElementById("output").innerHTML += `
            <h3>Part C: String Operations</h3>
            Original Name: ${fullName} <br>
            Uppercase: ${upperCaseName} <br>
            Length: ${nameLength} <br>
            First Name: ${firstName}
        `;


        function checkStringLength(str) {
            if (str.length > 5) {
                return "String length is greater than 5";
            } else {
                return "String length is 5 or less";
            }
        }

        let userInput = prompt("Enter a string:");
        let result = checkStringLength(userInput);

        document.getElementById("output").innerHTML += `
            <h3>Part D: String Length Check</h3>
            Input: ${userInput} <br>
            Result: ${result}
        `;
    </script>

</body>
</html>
